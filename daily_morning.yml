name: 每日早安圖自動發送

on:
  # ─── 每天台灣時間早上 7:00 自動執行 (UTC 23:00 前一天) ───────────────────
  schedule:
    - cron: "0 23 * * *"

  # ─── 允許手動觸發（方便測試）───────────────────────────────────────────────
  workflow_dispatch:

jobs:
  send-morning-image:
    name: 生成並發送早安圖
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. 取得程式碼
      - name: ⬇️ 取得程式碼
        uses: actions/checkout@v4

      # 2. 設定 Python 環境
      - name: 🐍 設定 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. 安裝中文字體（Ubuntu 環境需要）
      - name: 🔤 安裝中文字體
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk
          echo "字體安裝完成"
          fc-list | grep -i noto | head -5

      # 4. 安裝 Python 套件
      - name: 📦 安裝 Python 套件
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 5. 執行主程式
      - name: 🌅 執行早安圖發送程式
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        run: |
          python main.py

      # 6. 失敗通知（可選）
      - name: ❌ 失敗時顯示說明
        if: failure()
        run: |
          echo "早安圖發送失敗，請檢查："
          echo "1. GitHub Secrets 是否都已設定"
          echo "2. API Key 是否有效"
          echo "3. LINE User ID 是否正確"
